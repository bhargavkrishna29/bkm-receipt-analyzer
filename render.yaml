# render.yaml — Lekha Tracker deployment configuration for Render
# https://render.com/docs/blueprint-spec

services:
  - type: web
    name: lekha-tracker
    runtime: node
    plan: free

    # Build & start — Next.js
    buildCommand: npm install && npm run build
    startCommand: npm start

    # Health check
    healthCheckPath: /api/health

    # Auto-deploy when you push to main
    autoDeploy: true

    # Environment variables (set secret values in the Render dashboard)
    envVars:
      - key: NODE_ENV
        value: production

      # Rate limiting
      - key: RATE_LIMIT_MAX
        value: "10"
      - key: RATE_LIMIT_WINDOW_MS
        value: "3600000"

      # Set these as SECRET in the Render dashboard:
      # - key: GEMINI_API_KEY
      # - key: GEMINI_MODEL  (optional, defaults to gemini-2.5-flash-lite)

      # Firebase client config ( prefix required for browser exposure)
      # - key: FIREBASE_API_KEY
      # - key: FIREBASE_AUTH_DOMAIN
      # - key: FIREBASE_PROJECT_ID
      # - key: FIREBASE_STORAGE_BUCKET
      # - key: FIREBASE_MESSAGING_SENDER_ID
      # - key: FIREBASE_APP_ID
      # - key: FIREBASE_DATABASE_ID
